services:
  frontend:
    build:
      context: ../..
      dockerfile: deployment/docker/frontend.Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api/v1}
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy

  backend:
    build:
      context: ../..
      dockerfile: deployment/docker/backend.Dockerfile
    env_file:
      - ../../config/environments/prod.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_BROKER_URL: ${REDIS_BROKER_URL}
      REDIS_RESULT_BACKEND: ${REDIS_RESULT_BACKEND}
    restart: unless-stopped
    volumes:
      - ../../runtime/oracle-tools:/opt/oracle-tools:ro
      - ../../runtime/datapump-work:/var/lib/oracle-migration/datapump
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  worker:
    build:
      context: ../..
      dockerfile: deployment/docker/worker.Dockerfile
    env_file:
      - ../../config/environments/prod.env
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_BROKER_URL: ${REDIS_BROKER_URL}
      REDIS_RESULT_BACKEND: ${REDIS_RESULT_BACKEND}
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
      backend:
        condition: service_healthy
    volumes:
      - ../../runtime/oracle-tools:/opt/oracle-tools:ro
      - ../../runtime/datapump-work:/var/lib/oracle-migration/datapump

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  postgres:
    image: postgres:17-alpine
    env_file:
      - ../../config/environments/prod.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    restart: unless-stopped
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped
    volumes:
      - ../nginx/nginx.conf:/etc/nginx/nginx.conf:ro

volumes:
  postgres_prod_data:
